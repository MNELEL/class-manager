<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ClassManager Pro - Final Version</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Assistant', sans-serif; background-color: #f1f5f9; }
        .grid-container { display: grid; gap: 10px; padding: 20px; transition: all 0.3s ease; }
        .desk { 
            width: 90px; height: 80px; background: white; border: 2px solid #e2e8f0; 
            border-radius: 12px; display: flex; flex-direction: column; align-items: center; 
            justify-content: center; position: relative; cursor: grab; transition: 0.2s;
            font-size: 0.85rem; font-weight: 600; text-align: center; padding: 4px;
        }
        .desk.hidden { opacity: 0.1; background: transparent; border: 2px dashed #cbd5e1; cursor: default; }
        .desk.locked { border-color: #4f46e5; background-color: #eef2ff; }
        .desk.locked::after { content: '🔒'; position: absolute; top: 2px; right: 2px; font-size: 0.7rem; }
        .desk.spacer { margin-left: 40px; border-left: 4px solid #4f46e5; }
        .sidebar { transition: transform 0.3s ease; }
        @media (max-width: 768px) {
            .sidebar { transform: translateX(100%); position: fixed; right: 0; top: 0; height: 100%; z-index: 50; width: 80%; }
            .sidebar.active { transform: translateX(0); }
        }
        .teacher-desk { background: #4f46e5; color: white; border-radius: 0 0 20px 20px; padding: 10px; width: 200px; margin: 0 auto 30px; text-align: center; font-weight: bold; }
    </style>
</head>
<body class="overflow-x-hidden">
    <div class="min-h-screen flex flex-col">
        <header class="bg-white shadow-md p-4 flex justify-between items-center sticky top-0 z-40">
            <div class="flex items-center gap-4">
                <button onclick="toggleSidebar()" class="text-2xl lg:hidden">☰</button>
                <h1 class="text-xl font-bold text-indigo-600">ClassManager <span class="text-gray-400 font-light text-sm">Pro</span></h1>
            </div>
            <div class="flex gap-2">
                <button onclick="runSmartSort()" class="bg-indigo-600 text-white px-4 py-2 rounded-lg font-bold shadow-lg hover:bg-indigo-700 active:scale-95 transition">🪄 סידור חכם</button>
                <button onclick="window.print()" class="bg-gray-100 p-2 rounded-lg border hover:bg-gray-200">🖨️</button>
            </div>
        </header>

        <div class="flex flex-1 relative">
            <aside id="sidebar" class="sidebar w-72 bg-white border-l shadow-xl p-4 overflow-y-auto">
                <div class="flex justify-between items-center mb-6 lg:hidden">
                    <h3 class="font-bold">תפריט</h3>
                    <button onclick="toggleSidebar()" class="text-xl">✕</button>
                </div>

                <div class="space-y-4">
                    <label class="block w-full text-center bg-indigo-50 text-indigo-700 py-3 rounded-xl border-2 border-dashed border-indigo-200 cursor-pointer hover:bg-indigo-100 transition">
                        📥 ייבוא (Excel/JSON)
                        <input type="file" id="fileInput" hidden onchange="handleUniversalImport(event)">
                    </label>
                    
                    <div class="bg-gray-50 p-3 rounded-lg space-y-2">
                        <h4 class="text-sm font-bold text-gray-600">מידות כיתה:</h4>
                        <div class="flex justify-between items-center bg-white p-2 rounded border">
                            <span>טורים:</span>
                            <div class="flex gap-2">
                                <button onclick="changeGrid('cols', 1)" class="w-8 h-8 border rounded hover:bg-gray-50">+</button>
                                <button onclick="changeGrid('cols', -1)" class="w-8 h-8 border rounded hover:bg-gray-50">-</button>
                            </div>
                        </div>
                        <div class="flex justify-between items-center bg-white p-2 rounded border">
                            <span>שורות:</span>
                            <div class="flex gap-2">
                                <button onclick="changeGrid('rows', 1)" class="w-8 h-8 border rounded hover:bg-gray-50">+</button>
                                <button onclick="changeGrid('rows', -1)" class="w-8 h-8 border rounded hover:bg-gray-50">-</button>
                            </div>
                        </div>
                    </div>

                    <div>
                        <h4 class="text-sm font-bold text-gray-600 mb-2">מאגר תלמידים:</h4>
                        <div id="studentPool" class="min-h-[100px] bg-gray-50 rounded-lg p-2 border-2 border-dashed flex flex-wrap gap-2">
                            </div>
                    </div>
                </div>
            </aside>

            <main class="flex-1 p-4 lg:p-8">
                <div class="max-w-4xl mx-auto">
                    <div class="flex flex-wrap justify-center gap-2 mb-6">
                        <button id="normalBtn" onclick="setMode('normal')" class="mode-btn active bg-indigo-600 text-white px-4 py-2 rounded-full text-sm font-bold shadow">רגיל</button>
                        <button id="structureBtn" onclick="setMode('structure')" class="mode-btn bg-white border px-4 py-2 rounded-full text-sm font-bold hover:bg-gray-50">🛠️ מחק שולחן</button>
                        <button id="gapBtn" onclick="setMode('gap')" class="mode-btn bg-white border px-4 py-2 rounded-full text-sm font-bold hover:bg-gray-50">↔️ רווחים</button>
                        <button onclick="clearGrid()" class="bg-red-50 text-red-600 px-4 py-2 rounded-full text-sm font-bold border border-red-100 hover:bg-red-100">🗑️ נקה הכל</button>
                    </div>

                    <div class="teacher-desk shadow-sm">לוח הכיתה / שולחן מורה</div>
                    
                    <div id="gridContainer" class="grid-container mx-auto">
                        </div>
                </div>
            </main>
        </div>
    </div>

    <div id="editModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-2xl w-full max-w-sm p-6 shadow-2xl">
            <h3 class="text-xl font-bold mb-4">עריכת תלמיד</h3>
            <input type="text" id="editNameInput" class="w-full border-2 border-gray-200 rounded-xl p-3 mb-6 focus:border-indigo-500 outline-none transition">
            <div class="flex gap-3">
                <button onclick="saveQuickEdit()" class="flex-1 bg-indigo-600 text-white py-3 rounded-xl font-bold">שמור</button>
                <button onclick="closeModal()" class="flex-1 bg-gray-100 py-3 rounded-xl font-bold">ביטול</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
